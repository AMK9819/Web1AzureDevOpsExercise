trigger:
- azure-pipelines-test   # or your branch

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: 'Build Static Site'
  jobs:
  - job: BuildJob
    steps:
    - checkout: self
    
    # Publish the build output as an artifact
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '.' # Change this to your build folder (dist, build, out)
        ArtifactName: 'drop'
        publishLocation: 'Container'


- stage: DeployDev
  displayName: 'Deploy to Dev'
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/dev')
  dependsOn: Build
  jobs:
  - deployment: DeployDevJob
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
          - task: AzureStaticWebApp@0 # For Azure Static Web Apps
            inputs:
              app_location: "/"
              azure_static_web_apps_api_token: $(deployment_token)



