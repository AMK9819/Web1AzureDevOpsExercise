trigger:
- azure-pipelines-test   # or your branch

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

# Optional build step (skip if pure static HTML)
- script: |
    echo "No build step needed"
  displayName: "Build step"

# Deploy step
- task: AzureStaticWebApp@0
  displayName: "Deploy to Azure Static Web App"
  inputs:
    app_location: "/"              # where your site lives
    output_location: ""            # leave empty if no build output
    api_location: ""               # leave empty unless using API
    azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)